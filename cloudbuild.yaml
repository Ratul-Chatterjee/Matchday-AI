steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/matchday-ai:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/matchday-ai:latest', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/matchday-ai:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'matchday-ai'
      - '--image=gcr.io/$PROJECT_ID/matchday-ai:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--timeout=300'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=REDIS_HOST=$_REDIS_HOST,REDIS_PORT=$_REDIS_PORT'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,MAPS_API_KEY=MAPS_API_KEY:latest'
      - '--vpc-connector=matchday-vpc-connector'
      - '--vpc-egress=private-ranges-only'

substitutions:
  _REDIS_HOST: '127.0.0.1'
  _REDIS_PORT: '6379'

timeout: '1200s'
